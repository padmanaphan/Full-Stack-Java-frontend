<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockDash - Create Shipment</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #4b0082, #6a11cb, #2575fc); min-height: 100vh; color: #fff; padding-bottom: 40px; }
        
        .navbar { background: rgba(36, 0, 70, 0.9); backdrop-filter: blur(10px); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .navbar h2 { font-size: 22px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ff9800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-nav { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .btn-nav:hover { background: white; color: #4b0082; transform: translateY(-2px); }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 18px; padding: 25px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
        .section-header { font-size: 18px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 10px; color: #ffd700; display: flex; justify-content: space-between; align-items: center; }
        .role-warning { font-size: 12px; background: rgba(255, 152, 0, 0.2); border: 1px solid #ff9800; color: #ffb74d; padding: 3px 10px; border-radius: 10px; font-weight: 400; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 500; color: #e0e0e0; }
        .form-group input, .form-group select { padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; font-size: 14px; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff9800; box-shadow: 0 0 10px rgba(255, 152, 0, 0.3); background: rgba(0, 0, 0, 0.4); }
        .form-group option { background: #240046; color: white; }
        
        .checkbox-group { flex-direction: row; align-items: center; gap: 10px; height: 100%; padding-top: 25px; }
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }
        
        .submit-btn { padding: 12px 28px; border: none; border-radius: 30px; cursor: pointer; font-size: 15px; font-weight: 600; color: white; background: linear-gradient(45deg, #ff9800, #ff5722); box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4); transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 87, 34, 0.6); }
        .submit-btn:disabled { background: #666; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        
        .response-box { margin-top: 20px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; padding: 15px; font-size: 13px; display: none; word-break: break-all; }
        .response-box.show { display: block; }
        .response-box.success { border-left: 5px solid #4caf50; background: rgba(76, 175, 80, 0.15); }
        .response-box.error { border-left: 5px solid #f44336; background: rgba(244, 67, 54, 0.15); color: #ff8a80; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2 onclick="location.href='../dockdashdashboard.html'">DockDash</h2>
        <div class="nav-right">
            <button class="btn-nav" onclick="location.href='shipments.html'">Back to Menu</button>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">
            <div class="section-header">
                <span>Create New Shipment</span>
                <span class="role-warning">Requires: Logistics Coordinator / Dock Manager</span>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="add-num">Shipment Number (Unique)</label>
                    <input type="text" id="add-num" placeholder="e.g. SH-98762">
                </div>
                <div class="form-group">
                    <label for="add-carrier">Carrier Name</label>
                    <input type="text" id="add-carrier" placeholder="e.g. DHL Express">
                </div>
                <div class="form-group">
                    <label for="add-units">Total Units</label>
                    <input type="number" id="add-units" placeholder="e.g. 150">
                </div>
                <div class="form-group">
                    <label for="add-weight">Estimated Weight (kg)</label>
                    <input type="number" id="add-weight" placeholder="e.g. 2400" step="0.01">
                </div>
                <div class="form-group">
                    <label for="add-priority">Priority</label>
                    <select id="add-priority">
                        <option value="STANDARD">STANDARD</option>
                        <option value="EXPEDITED">EXPEDITED</option>
                        <option value="CRITICAL">CRITICAL</option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="add-hazardous">
                    <label for="add-hazardous">Hazardous Material</label>
                </div>
            </div>
            <button class="submit-btn" id="btn-create-submit" onclick="createShipment()">Create Shipment</button>
            <div class="response-box" id="res-add"></div>
        </div>
    </div>

    <script>
        const API = 'https://padmanaphan.github.io/Full-Stack-Java-backend/api';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '../dockdashlogin.html';

        function authHeaders(extra) {
            return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
        }

        function showResponse(boxId, content, isError) {
            const box = document.getElementById(boxId);
            box.className = 'response-box show ' + (isError ? 'error' : 'success');
            box.innerHTML = content;
        }

        async function handleApiError(res, boxId) {
            if (res.status === 401) {
                alert('Session expired. Redirecting...');
                window.location.href = '../dockdashlogin.html';
                return true;
            }
            if (res.status === 403) {
                showResponse(boxId, '<strong>Access Denied!</strong> You do not have permission.', true);
                return true;
            }
            return false;
        }

        async function createShipment() {
            const shipmentNumber = document.getElementById('add-num').value.trim();
            const carrierName = document.getElementById('add-carrier').value.trim();
            const totalUnits = document.getElementById('add-units').value.trim();
            const estimatedWeight = document.getElementById('add-weight').value.trim();
            const priority = document.getElementById('add-priority').value;
            const hazardousMaterial = document.getElementById('add-hazardous').checked;

            if (!shipmentNumber || !carrierName || !totalUnits || !estimatedWeight) {
                showResponse('res-add', '⚠️ Please fill out all required fields.', true);
                return;
            }

            const btn = document.getElementById('btn-create-submit');
            btn.disabled = true;

            try {
                const res = await fetch(API + '/shipments', {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({
                        shipmentNumber, carrierName, totalUnits: parseInt(totalUnits),
                        estimatedWeight: parseFloat(estimatedWeight), priority, hazardousMaterial
                    })
                });

                if (await handleApiError(res, 'res-add')) {
                    btn.disabled = false; return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-add', 'Error: ' + (data.message || res.statusText), true);
                } else {
                    const data = await res.json();
                    showResponse('res-add', `✅ Shipment <strong>${data.shipmentNumber}</strong> created successfully.`, false);
                    document.getElementById('add-num').value = '';
                    document.getElementById('add-carrier').value = '';
                    document.getElementById('add-units').value = '';
                    document.getElementById('add-weight').value = '';
                    document.getElementById('add-hazardous').checked = false;
                }
            } catch (e) {
                showResponse('res-add', 'Connection error to server.', true);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
