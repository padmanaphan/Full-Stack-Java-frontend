<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockDash - Appointment Scheduling</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4b0082, #6a11cb, #2575fc);
            min-height: 100vh;
            color: #fff;
            padding-bottom: 40px;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(36, 0, 70, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ffd700, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-info {
            font-size: 14px;
            color: #ddd;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: white;
            color: #4b0082;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #ff5722;
            border: none;
        }

        .logout-btn:hover {
            background: #e64a19;
            color: white;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1050px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ── GLASSCARD ── */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            color: #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-warning {
            font-size: 12px;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ffb74d;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 400;
        }

        /* ── BUTTON ROW ── */
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tab-btn {
            padding: 10px 22px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #ff9800;
            border-color: #ff9800;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }

        /* ── PANEL ── */
        .panel {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── FORM FIELDS ── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .form-group input, .form-group select {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ff9800;
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        .form-group option {
            background: #240046;
            color: white;
        }

        .submit-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #ff9800, #ff5722);
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.6);
        }

        .submit-btn:disabled {
            background: #666;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            text-transform: uppercase;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .action-edit {
            background-color: #f44336; /* Red */
            border-radius: 4px;
        }

        .action-edit:hover {
            background-color: #d32f2f;
        }

        .action-delete {
            background-color: #455a64; /* Dark grey/blue */
            border-radius: 4px;
        }

        .action-delete:hover {
            background-color: #263238;
        }

        .action-checkin {
            background-color: #1976d2;
        }

        .action-checkin:hover {
            background-color: #115293;
            transform: scale(1.05);
        }

        .action-complete {
            background-color: #388e3c;
        }

        .action-complete:hover {
            background-color: #2e7d32;
            transform: scale(1.05);
        }

        /* ── RESPONSE BOX ── */
        .response-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            font-size: 13px;
            display: none;
            word-break: break-all;
            animation: fadeIn 0.3s ease;
        }

        .response-box.show {
            display: block;
        }

        .response-box.success {
            border-left: 5px solid #4caf50;
            background: rgba(76, 175, 80, 0.15);
        }

        .response-box.error {
            border-left: 5px solid #f44336;
            background: rgba(244, 67, 54, 0.15);
            color: #ff8a80;
        }

        /* ── TABLES ── */
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.2);
            text-align: left;
        }

        th {
            background: rgba(36, 0, 70, 0.8);
            color: #ffd700;
            font-weight: 600;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #f5f5f5;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ── BADGES ── */
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            color: white;
            text-transform: uppercase;
        }

        .badge-scheduled { background-color: #1976d2; }
        .badge-checked-in { background-color: #0097a7; }
        .badge-loading { background-color: #ef6c00; }
        .badge-completed { background-color: #388e3c; }
        .badge-cancelled { background-color: #d32f2f; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>DockDash</h2>
        <div class="nav-right">
            <span class="nav-info" id="nav-user">Logged in as: — (Role: —)</span>
            <button class="btn-nav" onclick="location.href='../dockdashdashboard.html'">Dashboard</button>
            <button class="btn-nav logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        
        <!-- MODULE OPERATION TABS -->
        <div class="glass-card">
            <div class="section-header">
                <span>Appointment Operations</span>
                <span id="user-role-badge" class="role-warning">Loading Role...</span>
            </div>
            <div class="btn-row">
                <button class="tab-btn active" onclick="switchTab('panel-view', this)">View Appointments</button>
                <button class="tab-btn" onclick="switchTab('panel-book', this)">Book Slot</button>
            </div>
        </div>

        <!-- PANEL: VIEW ALL APPOINTMENTS -->
        <div class="glass-card panel active" id="panel-view">
            <div class="section-header">
                <span>Appointment List & Operational Status</span>
                <button class="submit-btn" style="padding: 8px 18px; font-size: 13px;" onclick="fetchAppointments()">Refresh</button>
            </div>
            <div id="table-loader" style="text-align: center; padding: 20px; display: none;">Loading Appointments...</div>
            <div class="table-container" id="appointments-table-container">
                <!-- Loaded Dynamically -->
            </div>
            <div class="response-box" id="res-view"></div>
        </div>

        <!-- PANEL: BOOK SLOT -->
        <div class="glass-card panel" id="panel-book">
            <div class="section-header">
                <span>Book Warehouse Loading/Unloading Slot</span>
                <span class="role-warning">Requires: Logistics Coordinator / Dock Manager</span>
            </div>
            <div id="booking-loader" style="color: #ff9800; font-size: 13px; margin-bottom: 15px; display: none;">Fetching available Shipments and Loading Bays...</div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="book-shipment">Select Shipment (Unscheduled)</label>
                    <select id="book-shipment">
                        <!-- Loaded dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="book-bay">Select Loading Bay</label>
                    <select id="book-bay">
                        <!-- Loaded dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="book-start">Scheduled Start Date & Time</label>
                    <input type="datetime-local" id="book-start">
                </div>
                <div class="form-group">
                    <label for="book-end">Scheduled End Date & Time</label>
                    <input type="datetime-local" id="book-end">
                </div>
            </div>
            <button class="submit-btn" id="btn-book-submit" onclick="bookAppointment()">Book Appointment</button>
            <div class="response-box" id="res-book"></div>
        </div>

    </div>

    <script>
        const API = 'https://full-stack-java-backend-1.onrender.com/api';

        // ── Auth guard & details ──
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role') || '';

        if (!token) {
            window.location.href = '../dockdashlogin.html';
        } else {
            document.getElementById('nav-user').textContent = `Logged in as: ${username || '—'} (${role.replace('ROLE_', '').replace(/_/g, ' ')})`;
            document.getElementById('user-role-badge').textContent = role.replace('ROLE_', '').replace(/_/g, ' ');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = '../dockdashthankyou.html';
        }

        // ── Tab Switcher ──
        function switchTab(panelId, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(panelId).classList.add('active');
            btn.classList.add('active');

            if (panelId === 'panel-view') {
                fetchAppointments();
            } else if (panelId === 'panel-book') {
                loadBookingResources();
            }
        }

        // Authorization headers helper
        function authHeaders(extra) {
            return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
        }

        function showResponse(boxId, content, isError) {
            const box = document.getElementById(boxId);
            box.className = 'response-box show ' + (isError ? 'error' : 'success');
            box.innerHTML = content;
        }

        // Error Handler
        async function handleApiError(res, boxId) {
            if (res.status === 401) {
                alert('Session expired or unauthorized. Redirecting to login...');
                logout();
                return true;
            }
            if (res.status === 403) {
                showResponse(boxId, '<strong>Access Denied!</strong> Your current role doesn\'t have permission to perform this operation.', true);
                return true;
            }
            return false;
        }

        // Format dates
        function formatDateTime(dtStr) {
            if (!dtStr) return '—';
            // YYYY-MM-DDTHH:MM:SS -> YYYY-MM-DD HH:MM
            return dtStr.replace('T', ' ').substring(0, 16);
        }

        // ── FETCH ALL APPOINTMENTS ──
        async function fetchAppointments() {
            const loader = document.getElementById('table-loader');
            const container = document.getElementById('appointments-table-container');
            const resBox = document.getElementById('res-view');

            loader.style.display = 'block';
            container.innerHTML = '';
            resBox.className = 'response-box'; // hide

            try {
                const res = await fetch(API + '/appointments', {
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-view')) {
                    loader.style.display = 'none';
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', 'Failed to retrieve appointments: ' + (data.message || res.statusText), true);
                    loader.style.display = 'none';
                    return;
                }

                const appointments = await res.json();
                loader.style.display = 'none';

                if (appointments.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center;">No scheduled appointments found.</div>';
                    return;
                }

                let html = `<table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Shipment Number</th>
                            <th>Carrier</th>
                            <th>Loading Bay</th>
                            <th>Scheduled Start</th>
                            <th>Scheduled End</th>
                            <th>Actual Arrival</th>
                            <th>Completion Time</th>
                            <th>Status</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody>`;

                appointments.forEach(app => {
                    const statusClass = 'badge-' + (app.status || '').toLowerCase().replace('_', '-');
                    
                    // Construct quick action buttons based on user roles
                    let actionHtml = '—';
                    if (app.status === 'SCHEDULED') {
                        // Check-in requires role DOCK_MANAGER or CARRIER_PARTNER
                        const disabledAttr = (role === 'ROLE_DOCK_MANAGER' || role === 'ROLE_CARRIER_PARTNER') ? '' : 'disabled style="opacity:0.5; cursor:not-allowed;" title="Requires Dock Manager or Carrier Partner"';
                        actionHtml = `<button class="action-btn action-checkin" ${disabledAttr} onclick="triggerAction(${app.id}, 'check-in')">Check In</button>`;
                    } else if (app.status === 'CHECKED_IN' || app.status === 'LOADING') {
                        // Complete requires role DOCK_MANAGER or WAREHOUSE_OPERATIVE
                        const disabledAttr = (role === 'ROLE_DOCK_MANAGER' || role === 'ROLE_WAREHOUSE_OPERATIVE') ? '' : 'disabled style="opacity:0.5; cursor:not-allowed;" title="Requires Dock Manager or Warehouse Operative"';
                        actionHtml = `<button class="action-btn action-complete" ${disabledAttr} onclick="triggerAction(${app.id}, 'complete')">Complete</button>`;
                    }

                    if (actionHtml === '—') actionHtml = '';
                    actionHtml += `<button class="action-btn action-edit" onclick="alert('Edit functionality not yet implemented')">EDIT</button>
                                   <button class="action-btn action-delete" onclick="deleteAppointment(${app.id})">Delete</button>`;

                    html += `
                        <tr>
                            <td><strong>${app.id}</strong></td>
                            <td>${escapeHtml(app.shipment.shipmentNumber)}</td>
                            <td>${escapeHtml(app.shipment.carrierName)}</td>
                            <td>${escapeHtml(app.bay.bayNumber)}</td>
                            <td>${formatDateTime(app.scheduledStart)}</td>
                            <td>${formatDateTime(app.scheduledEnd)}</td>
                            <td>${formatDateTime(app.actualArrival)}</td>
                            <td>${formatDateTime(app.completionTime)}</td>
                            <td><span class="badge ${statusClass}">${app.status}</span></td>
                            <td>${actionHtml}</td>
                        </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (e) {
                loader.style.display = 'none';
                showResponse('res-view', 'Cannot connect to server. Ensure backend is running.', true);
            }
        }

        // ── INLINE ACTION BUTTON TRIGGERS ──
        async function triggerAction(appointmentId, actionType) {
            const resBox = document.getElementById('res-view');
            resBox.className = 'response-box'; // hide
            
            let url = `${API}/appointments/${appointmentId}/${actionType}`;
            try {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-view')) {
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', `Failed to perform ${actionType}: ` + (data.message || res.statusText), true);
                    return;
                }

                const updatedApp = await res.json();
                showResponse('res-view', `✅ Appointment <strong>#${appointmentId}</strong> successfully updated to: <span class="badge badge-${updatedApp.status.toLowerCase().replace('_', '-')}">${updatedApp.status}</span>`, false);
                
                // Refresh list
                fetchAppointments();

            } catch (e) {
                showResponse('res-view', 'Connection error to backend server.', true);
            }
        }

        // ── DYNAMIC DROPDOWN LOADER ──
        async function loadBookingResources() {
            const loader = document.getElementById('booking-loader');
            const shipmentSelect = document.getElementById('book-shipment');
            const baySelect = document.getElementById('book-bay');

            loader.style.display = 'block';
            shipmentSelect.innerHTML = '<option value="">Select Shipment...</option>';
            baySelect.innerHTML = '<option value="">Select Loading Bay...</option>';

            try {
                // 1. Fetch available shipments
                const resShipments = await fetch(API + '/shipments?available=true', { headers: authHeaders() });
                // 2. Fetch bays
                const resBays = await fetch(API + '/bays', { headers: authHeaders() });

                loader.style.display = 'none';

                if (resShipments.ok) {
                    const shipments = await resShipments.json();
                    if (shipments.length === 0) {
                        shipmentSelect.innerHTML = '<option value="">No available (unscheduled) shipments found</option>';
                    } else {
                        shipments.forEach(s => {
                            shipmentSelect.innerHTML += `<option value="${s.id}">ID ${s.id}: ${escapeHtml(s.shipmentNumber)} (${escapeHtml(s.carrierName)})</option>`;
                        });
                    }
                } else {
                    shipmentSelect.innerHTML = '<option value="">Failed to load shipments</option>';
                }

                if (resBays.ok) {
                    const bays = await resBays.json();
                    if (bays.length === 0) {
                        baySelect.innerHTML = '<option value="">No loading bays found</option>';
                    } else {
                        bays.forEach(b => {
                            baySelect.innerHTML += `<option value="${b.id}">ID ${b.id}: ${escapeHtml(b.bayNumber)} (${b.bayType} - Status: ${b.status})</option>`;
                        });
                    }
                } else {
                    baySelect.innerHTML = '<option value="">Failed to load bays</option>';
                }

            } catch (e) {
                loader.style.display = 'none';
                shipmentSelect.innerHTML = '<option value="">Error connecting to server</option>';
                baySelect.innerHTML = '<option value="">Error connecting to server</option>';
            }
        }

        // ── BOOK SLOT ──
        async function bookAppointment() {
            const shipmentId = document.getElementById('book-shipment').value;
            const bayId = document.getElementById('book-bay').value;
            const scheduledStart = document.getElementById('book-start').value;
            const scheduledEnd = document.getElementById('book-end').value;

            if (!shipmentId || !bayId || !scheduledStart || !scheduledEnd) {
                showResponse('res-book', '⚠️ Please select both Shipment & Bay, and schedule Start & End times.', true);
                return;
            }

            const btn = document.getElementById('btn-book-submit');
            btn.disabled = true;

            try {
                const res = await fetch(API + '/appointments/book', {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({
                        shipmentId: parseInt(shipmentId),
                        bayId: parseInt(bayId),
                        scheduledStart: scheduledStart + ':00', // appending seconds to align format
                        scheduledEnd: scheduledEnd + ':00'
                    })
                });

                if (await handleApiError(res, 'res-book')) {
                    btn.disabled = false;
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-book', 'Error booking appointment: ' + (data.message || res.statusText), true);
                } else {
                    const data = await res.json();
                    showResponse('res-book', `✅ Appointment booked successfully! ID: <strong>${data.id}</strong>. Scheduled Start: <strong>${formatDateTime(data.scheduledStart)}</strong>. Status: <span class="badge badge-scheduled">SCHEDULED</span>.`, false);
                    
                    // Reload dropdowns since the selected shipment is now scheduled
                    loadBookingResources();
                    // Clear times
                    document.getElementById('book-start').value = '';
                    document.getElementById('book-end').value = '';
                }
            } catch (e) {
                showResponse('res-book', 'Connection error to backend server.', true);
            } finally {
                btn.disabled = false;
            }
        }

        // Helper to escape HTML tags
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Auto load list on start
        fetchAppointments();

        // ── DELETE APPOINTMENT ──
        async function deleteAppointment(id) {
            if (!confirm('Are you sure you want to delete Appointment ID ' + id + '?')) return;
            try {
                const res = await fetch(`${API}/appointments/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-view')) {
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', 'Failed to delete appointment: ' + (data.message || res.statusText), true);
                } else {
                    showResponse('res-view', `✅ Appointment ID <strong>${id}</strong> deleted successfully.`, false);
                    fetchAppointments();
                }
            } catch (e) {
                showResponse('res-view', 'Connection error to backend server.', true);
            }
        }
    </script>
</body>
</html>
