<!DOCTYPE html>
<html>
<head>
    <title>DockDash - User Registration</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1e0030, #360763, #093481);
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container{
            width:420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding:50px 40px;
            border-radius:24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            text-align:center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        h1{
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        input,select{
            width:100%;
            padding:16px;
            margin:10px 0;
            border-radius:12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size:16px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        select {
            color: rgba(255, 255, 255, 0.8);
        }

        select option {
            color: #333;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        button{
            width:100%;
            padding:16px;
            margin-top:20px;
            background: linear-gradient(90deg, #ff8a00, #e52e71);
            color:white;
            border:none;
            border-radius:30px;
            font-size:18px;
            font-weight:700;
            cursor:pointer;
            box-shadow: 0 10px 20px rgba(229, 46, 113, 0.4);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #e52e71, #ff8a00);
            z-index: -1;
            transition: opacity 0.3s ease;
            border-radius: 30px;
            opacity: 0;
        }

        button:hover::before {
            opacity: 1;
        }

        button:hover{
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(229, 46, 113, 0.6);
        }

        p{
            margin-top:25px;
            color: rgba(255,255,255,0.8);
        }

        a{
            color: #00d2ff;
            text-decoration:none;
            font-weight:700;
            margin-left: 5px;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #ff8a00;
        }

    </style>

</head>

<body>

<div class="container">

<h1>DockDash Registration</h1>

<input type="text" id="username" placeholder="Enter Username">

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<select id="role">

<option value="">Select Role</option>

<option value="LOGISTICS_COORDINATOR">LOGISTICS_COORDINATOR</option>

<option value="DOCK_MANAGER">DOCK_MANAGER</option>

<option value="WAREHOUSE_OPERATIVE">WAREHOUSE_OPERATIVE</option>

<option value="CARRIER_PARTNER">CARRIER_PARTNER</option>

</select>

<button onclick="registerUser()">REGISTER</button>

<p>
Already have an account?

<a href="dockdashlogin.html">Login Here</a>

</p>

</div>

<script>

function registerUser(){

    const user={

        username:document.getElementById("username").value,

        email:document.getElementById("email").value,

        password:document.getElementById("password").value,

        role:document.getElementById("role").value

    };

    fetch("https://padmanaphan.github.io/Full-Stack-Java-backend/api/auth/register",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(user)

    })

    .then(response=>{

        if(response.ok){

            alert("Registration Successful");

            window.location.href="dockdashlogin.html";

        }
        else{

            response.text().then(message=>{

                alert(message);

            });

        }

    })

    .catch(error=>{

        alert("Cannot connect to Spring Boot server");

        console.log(error);

    });

}

</script>

</body>
</html>
