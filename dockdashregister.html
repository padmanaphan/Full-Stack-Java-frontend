<!DOCTYPE html>
<html>
<head>
    <title>DockDash - User Registration</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4b0082,#6a11cb,#2575fc);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:420px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            text-align:center;
        }

        h1{
            color:white;
            margin-bottom:25px;
        }

        input,select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            border:none;
            border-radius:30px;
            background:#ff9800;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#ff5722;
        }

        p{
            margin-top:20px;
            color:white;
        }

        a{
            color:#ffd700;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>DockDash Registration</h1>

<input type="text" id="username" placeholder="Enter Username">

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<select id="role">

<option value="">Select Role</option>

<option value="LOGISTICS_COORDINATOR">LOGISTICS_COORDINATOR</option>

<option value="DOCK_MANAGER">DOCK_MANAGER</option>

<option value="WAREHOUSE_OPERATIVE">WAREHOUSE_OPERATIVE</option>

<option value="CARRIER_PARTNER">CARRIER_PARTNER</option>

</select>

<button onclick="registerUser()">REGISTER</button>

<p>
Already have an account?

<a href="dockdashlogin.html">Login Here</a>

</p>

</div>

<script>

function registerUser(){

    const user={

        username:document.getElementById("username").value,

        email:document.getElementById("email").value,

        password:document.getElementById("password").value,

        role:document.getElementById("role").value

    };

    fetch("https://full-stack-java-backend-1.onrender.com/api/auth/register",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(user)

    })

    .then(response=>{

        if(response.ok){

            alert("Registration Successful");

            window.location.href="dockdashlogin.html";

        }
        else{

            response.text().then(message=>{

                alert(message);

            });

        }

    })

    .catch(error=>{

        alert("Cannot connect to Spring Boot server");

        console.log(error);

    });

}

</script>

</body>
</html>
