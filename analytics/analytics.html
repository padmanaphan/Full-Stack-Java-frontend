<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockDash - Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4b0082, #6a11cb, #2575fc);
            min-height: 100vh;
            color: #fff;
            padding-bottom: 40px;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(36, 0, 70, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ffd700, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-info {
            font-size: 14px;
            color: #ddd;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: white;
            color: #4b0082;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #ff5722;
            border: none;
        }

        .logout-btn:hover {
            background: #e64a19;
            color: white;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ── GLASSCARD ── */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            color: #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── STATS GRID ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }

        .stat-title {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        /* Borders and Highlights */
        .card-blue {
            border-left: 5px solid #2196f3;
        }
        .card-blue .stat-value {
            color: #2196f3;
            text-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
        }

        .card-orange {
            border-left: 5px solid #ff9800;
        }
        .card-orange .stat-value {
            color: #ff9800;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
        }

        .card-red {
            border-left: 5px solid #f44336;
        }
        .card-red .stat-value {
            color: #f44336;
            text-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }

        .card-green {
            border-left: 5px solid #4caf50;
        }
        .card-green .stat-value {
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .submit-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #ff9800, #ff5722);
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.6);
        }

        /* ── RESPONSE BOX ── */
        .response-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            font-size: 13px;
            display: none;
            word-break: break-all;
        }

        .response-box.show {
            display: block;
        }

        .response-box.error {
            border-left: 5px solid #f44336;
            background: rgba(244, 67, 54, 0.15);
            color: #ff8a80;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>DockDash</h2>
        <div class="nav-right">
            <span class="nav-info" id="nav-user">Logged in as: — (Role: —)</span>
            <button class="btn-nav" onclick="location.href='../dockdashdashboard.html'">Dashboard</button>
            <button class="btn-nav logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        
        <div class="glass-card">
            <div class="section-header">
                <span>Warehouse Analytics & Utilization</span>
                <button class="submit-btn" style="padding: 8px 18px; font-size: 13px;" onclick="fetchStats()">Refresh Data</button>
            </div>

            <!-- Loader -->
            <div id="stats-loader" style="text-align: center; padding: 40px;">Fetching warehouse statistics...</div>

            <!-- Stats Container -->
            <div class="stats-grid" id="stats-container" style="display: none;">
                <!-- Total Appointments -->
                <div class="stat-card card-blue">
                    <div class="stat-title">Total Appointments</div>
                    <div class="stat-value" id="stat-total-app">—</div>
                    <div style="font-size:11px; color:#aaa;">Scheduled cargo slots</div>
                </div>

                <!-- Active Loadings -->
                <div class="stat-card card-orange">
                    <div class="stat-title">Active Loadings</div>
                    <div class="stat-value" id="stat-active-load">—</div>
                    <div style="font-size:11px; color:#aaa;">Currently at loading docks</div>
                </div>

                <!-- Pending Activity Logs -->
                <div class="stat-card card-red">
                    <div class="stat-title">Pending Logs</div>
                    <div class="stat-value" id="stat-pending-logs">—</div>
                    <div style="font-size:11px; color:#aaa;">Logs awaiting approval</div>
                </div>

                <!-- Available Loading Bays -->
                <div class="stat-card card-green">
                    <div class="stat-title">Available Bays</div>
                    <div class="stat-value" id="stat-available-bays">—</div>
                    <div style="font-size:11px; color:#aaa;">Vacant bay slots</div>
                </div>
            </div>

            <div class="response-box" id="res-analytics"></div>
        </div>

    </div>

    <script>
        const API = 'https://full-stack-java-backend-1.onrender.com/api';

        // ── Auth guard & details ──
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role') || '';

        if (!token) {
            window.location.href = '../dockdashlogin.html';
        } else {
            document.getElementById('nav-user').textContent = `Logged in as: ${username || '—'} (${role.replace('ROLE_', '').replace(/_/g, ' ')})`;
        }

        // Roles checklist - Carrier Partner is unauthorized for analytics
        if (role === 'ROLE_CARRIER_PARTNER') {
            document.getElementById('stats-loader').style.display = 'none';
            showResponse('res-analytics', '<strong>Access Denied!</strong><br><br>Carrier Partners are not authorized to view the warehouse analytics dashboard.', true);
        } else {
            // Auto fetch for allowed roles
            fetchStats();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = '../dockdashthankyou.html';
        }

        // Authorization headers helper
        function authHeaders(extra) {
            return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
        }

        function showResponse(boxId, content, isError) {
            const box = document.getElementById(boxId);
            box.className = 'response-box show ' + (isError ? 'error' : 'success');
            box.innerHTML = content;
        }

        // Error Handler
        async function handleApiError(res, boxId) {
            if (res.status === 401) {
                alert('Session expired or unauthorized. Redirecting to login...');
                logout();
                return true;
            }
            if (res.status === 403) {
                showResponse(boxId, '<strong>Access Denied!</strong> Your current role doesn\'t have permission to access analytics.', true);
                return true;
            }
            return false;
        }

        // ── FETCH LIVE STATISTICS ──
        async function fetchStats() {
            const loader = document.getElementById('stats-loader');
            const grid = document.getElementById('stats-container');
            const resBox = document.getElementById('res-analytics');

            loader.style.display = 'block';
            grid.style.display = 'none';
            resBox.className = 'response-box'; // hide

            try {
                const res = await fetch(API + '/analytics/dashboard', {
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-analytics')) {
                    loader.style.display = 'none';
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-analytics', 'Failed to retrieve stats: ' + (data.message || res.statusText), true);
                    loader.style.display = 'none';
                    return;
                }

                const stats = await res.json();
                
                document.getElementById('stat-total-app').textContent = stats.totalAppointments;
                document.getElementById('stat-active-load').textContent = stats.activeLoadings;
                document.getElementById('stat-pending-logs').textContent = stats.pendingLogs;
                document.getElementById('stat-available-bays').textContent = stats.availableBays;

                loader.style.display = 'none';
                grid.style.display = 'grid';

            } catch (e) {
                loader.style.display = 'none';
                showResponse('res-analytics', 'Cannot connect to server. Ensure backend is running.', true);
            }
        }
    </script>
</body>
</html>
