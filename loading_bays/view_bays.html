<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockDash - View Loading Bays</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #4b0082, #6a11cb, #2575fc); min-height: 100vh; color: #fff; padding-bottom: 40px; }
        
        .navbar { background: rgba(36, 0, 70, 0.9); backdrop-filter: blur(10px); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .navbar h2 { font-size: 22px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ff9800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-info { font-size: 14px; color: #ddd; }
        .btn-nav { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .btn-nav:hover { background: white; color: #4b0082; transform: translateY(-2px); }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 18px; padding: 25px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
        .section-header { font-size: 18px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 10px; color: #ffd700; display: flex; justify-content: space-between; align-items: center; }
        
        .submit-btn { padding: 12px 28px; border: none; border-radius: 30px; cursor: pointer; font-size: 15px; font-weight: 600; color: white; background: linear-gradient(45deg, #ff9800, #ff5722); box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4); transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 87, 34, 0.6); }
        
        .table-container { overflow-x: auto; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.15); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: rgba(0, 0, 0, 0.2); text-align: left; }
        th { background: rgba(36, 0, 70, 0.8); color: #ffd700; font-weight: 600; padding: 14px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        td { padding: 12px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: #f5f5f5; }
        tr:hover td { background: rgba(255, 255, 255, 0.05); }
        
        .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 12px; color: white; text-transform: uppercase; }
        .badge-available { background-color: #2e7d32; } 
        .badge-occupied { background-color: #ef6c00; }  
        .badge-maintenance { background-color: #c62828; } 
        .badge-reserved { background-color: #6a1b9a; }    
        .badge-inbound { background-color: #1565c0; }
        .badge-outbound { background-color: #00838f; }
        .badge-cold { background-color: #0277bd; }
        
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; transition: all 0.3s; margin-right: 5px; }
        .action-edit { background-color: #f44336; }
        .action-edit:hover { background-color: #d32f2f; }
        .action-delete { background-color: #455a64; }
        .action-delete:hover { background-color: #263238; }

        .response-box { margin-top: 20px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; padding: 15px; font-size: 13px; display: none; }
        .response-box.show { display: block; }
        .response-box.success { border-left: 5px solid #4caf50; background: rgba(76, 175, 80, 0.15); }
        .response-box.error { border-left: 5px solid #f44336; background: rgba(244, 67, 54, 0.15); color: #ff8a80; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2 onclick="location.href='../dockdashdashboard.html'">DockDash</h2>
        <div class="nav-right">
            <button class="btn-nav" onclick="location.href='loading_bays.html'">Back to Menu</button>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">
            <div class="section-header">
                <span>All Warehouse Loading Bays</span>
                <button class="submit-btn" style="padding: 8px 18px; font-size: 13px;" onclick="fetchBays()">Refresh</button>
            </div>
            
            <div id="table-loader" style="text-align: center; padding: 20px; display: none;">Loading Loading Bays...</div>
            <div class="table-container" id="bays-table-container">
                <!-- Loaded Dynamically -->
            </div>
            <div class="response-box" id="res-view"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080/api';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '../dockdashlogin.html';

        function authHeaders(extra) {
            return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
        }

        function showResponse(boxId, content, isError) {
            const box = document.getElementById(boxId);
            box.className = 'response-box show ' + (isError ? 'error' : 'success');
            box.innerHTML = content;
        }

        async function handleApiError(res, boxId) {
            if (res.status === 401) {
                alert('Session expired. Redirecting...');
                window.location.href = '../dockdashlogin.html';
                return true;
            }
            if (res.status === 403) {
                showResponse(boxId, '<strong>Access Denied!</strong> You do not have permission.', true);
                return true;
            }
            return false;
        }

        async function fetchBays() {
            const loader = document.getElementById('table-loader');
            const container = document.getElementById('bays-table-container');
            const resBox = document.getElementById('res-view');

            loader.style.display = 'block';
            container.innerHTML = '';
            resBox.className = 'response-box'; 

            try {
                const res = await fetch(API + '/bays', { headers: authHeaders() });
                if (await handleApiError(res, 'res-view')) {
                    loader.style.display = 'none'; return;
                }
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', 'Failed to retrieve bays: ' + (data.message || res.statusText), true);
                    loader.style.display = 'none'; return;
                }

                const bays = await res.json();
                loader.style.display = 'none';

                if (bays.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center;">No loading bays configured in the warehouse.</div>';
                    return;
                }

                let html = `<table><thead><tr><th>ID</th><th>Bay Number</th><th>Type</th><th>Status</th><th>Max Weight Capacity</th><th>Current Weight</th><th>Action</th></tr></thead><tbody>`;
                bays.forEach(bay => {
                    const typeClass = 'badge-' + (bay.bayType || '').toLowerCase().replace('_', '-');
                    const statusClass = 'badge-' + (bay.status || '').toLowerCase().replace('_', '-');
                    html += `<tr>
                        <td><strong>${bay.id}</strong></td>
                        <td>${escapeHtml(bay.bayNumber)}</td>
                        <td><span class="badge ${typeClass}">${bay.bayType}</span></td>
                        <td><span class="badge ${statusClass}">${bay.status}</span></td>
                        <td>${bay.maxWeightCapacity ? parseFloat(bay.maxWeightCapacity).toLocaleString() + ' kg' : 'N/A'}</td>
                        <td>${bay.currentWeight !== undefined ? parseFloat(bay.currentWeight).toLocaleString() + ' kg' : '0 kg'}</td>
                        <td><button class="action-btn action-delete" onclick="deleteBay(${bay.id})">Delete</button></td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                loader.style.display = 'none';
                showResponse('res-view', 'Cannot connect to server.', true);
            }
        }

        async function deleteBay(id) {
            if (!confirm('Delete Loading Bay ID ' + id + '?')) return;
            try {
                const res = await fetch(`${API}/bays/${id}`, { method: 'DELETE', headers: authHeaders() });
                if (await handleApiError(res, 'res-view')) return;
                if (!res.ok) {
                    showResponse('res-view', 'Failed to delete bay.', true);
                } else {
                    showResponse('res-view', `✅ Loading Bay ID <strong>${id}</strong> deleted.`, false);
                    fetchBays();
                }
            } catch (e) {
                showResponse('res-view', 'Connection error.', true);
            }
        }

        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, m => ({'&': '&amp;','<': '&lt;','>': '&gt;','"': '&quot;',"'": '&#039;'}[m]));
        }

        fetchBays();
    </script>
</body>
</html>
