<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockDash - Dock Activity Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4b0082, #6a11cb, #2575fc);
            min-height: 100vh;
            color: #fff;
            padding-bottom: 40px;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(36, 0, 70, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ffd700, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-info {
            font-size: 14px;
            color: #ddd;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: white;
            color: #4b0082;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #ff5722;
            border: none;
        }

        .logout-btn:hover {
            background: #e64a19;
            color: white;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ── GLASSCARD ── */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            color: #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-warning {
            font-size: 12px;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ffb74d;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 400;
        }

        /* ── BUTTON ROW ── */
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tab-btn {
            padding: 10px 22px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #ff9800;
            border-color: #ff9800;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }

        /* ── PANEL ── */
        .panel {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── FORM FIELDS ── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ff9800;
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        .form-group option {
            background: #240046;
            color: white;
        }

        .submit-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #ff9800, #ff5722);
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.6);
        }

        .submit-btn:disabled {
            background: #666;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            text-transform: uppercase;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .action-edit {
            background-color: #f44336; /* Red */
            border-radius: 4px;
        }

        .action-edit:hover {
            background-color: #d32f2f;
        }

        .action-delete {
            background-color: #455a64; /* Dark grey/blue */
            border-radius: 4px;
        }

        .action-delete:hover {
            background-color: #263238;
        }

        .action-approve {
            background-color: #388e3c;
        }

        .action-approve:hover {
            background-color: #2e7d32;
            transform: scale(1.05);
        }

        /* ── RESPONSE BOX ── */
        .response-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            font-size: 13px;
            display: none;
            word-break: break-all;
            animation: fadeIn 0.3s ease;
        }

        .response-box.show {
            display: block;
        }

        .response-box.success {
            border-left: 5px solid #4caf50;
            background: rgba(76, 175, 80, 0.15);
        }

        .response-box.error {
            border-left: 5px solid #f44336;
            background: rgba(244, 67, 54, 0.15);
            color: #ff8a80;
        }

        /* ── TABLES ── */
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.2);
            text-align: left;
        }

        th {
            background: rgba(36, 0, 70, 0.8);
            color: #ffd700;
            font-weight: 600;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #f5f5f5;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ── BADGES ── */
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            color: white;
            text-transform: uppercase;
        }

        .badge-approved { background-color: #388e3c; }
        .badge-pending { background-color: #ef6c00; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>DockDash</h2>
        <div class="nav-right">
            <span class="nav-info" id="nav-user">Logged in as: — (Role: —)</span>
            <button class="btn-nav" onclick="location.href='../dockdashdashboard.html'">Dashboard</button>
            <button class="btn-nav logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        
        <!-- MODULE OPERATION TABS -->
        <div class="glass-card">
            <div class="section-header">
                <span>Dock Activity Logging</span>
                <span id="user-role-badge" class="role-warning">Loading Role...</span>
            </div>
            <div class="btn-row">
                <button class="tab-btn active" onclick="switchTab('panel-view', this)">View Logs</button>
                <button class="tab-btn" onclick="switchTab('panel-log', this)">Log New Activity</button>
            </div>
        </div>

        <!-- PANEL: VIEW ACTIVITY LOGS -->
        <div class="glass-card panel active" id="panel-view">
            <div class="section-header">
                <span>Query Activity Logs for an Appointment</span>
            </div>
            <div class="form-grid" style="align-items: end; grid-template-columns: 1fr auto;">
                <div class="form-group">
                    <label for="query-app-id">Enter Appointment ID</label>
                    <input type="number" id="query-app-id" placeholder="e.g. 1">
                </div>
                <button class="submit-btn" onclick="fetchLogs()">Search Logs</button>
            </div>
            <div id="table-loader" style="text-align: center; padding: 20px; display: none;">Fetching logs...</div>
            <div class="table-container" id="logs-table-container" style="display: none;">
                <!-- Loaded Dynamically -->
            </div>
            <div class="response-box" id="res-view"></div>
        </div>

        <!-- PANEL: LOG NEW ACTIVITY -->
        <div class="glass-card panel" id="panel-log">
            <div class="section-header">
                <span>Log New Loading/Unloading Event</span>
                <span class="role-warning">Requires: Dock Manager / Warehouse Operative</span>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="log-app-id">Appointment ID</label>
                    <input type="number" id="log-app-id" placeholder="e.g. 1">
                </div>
                <div class="form-group">
                    <label for="log-type">Activity Type</label>
                    <select id="log-type">
                        <option value="START_LOADING">START LOADING</option>
                        <option value="FINISH_LOADING">FINISH LOADING</option>
                        <option value="SAFETY_CHECK">SAFETY CHECK</option>
                        <option value="WEIGHT_VERIFIED">WEIGHT VERIFIED</option>
                        <option value="SECURITY_SEAL_APPLIED">SECURITY SEAL APPLIED</option>
                        <option value="GATE_OUT">GATE OUT</option>
                        <option value="DELAY_REPORTED">DELAY REPORTED</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="log-notes">Notes / Observations</label>
                    <textarea id="log-notes" placeholder="Enter details of the activity performed..."></textarea>
                </div>
            </div>
            <button class="submit-btn" id="btn-log-submit" onclick="logActivity()">Submit Activity Log</button>
            <div class="response-box" id="res-log"></div>
        </div>

    </div>

    <script>
        const API = 'http://localhost:8080/api';

        // ── Auth guard & details ──
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role') || '';

        if (!token) {
            window.location.href = '../dockdashlogin.html';
        } else {
            document.getElementById('nav-user').textContent = `Logged in as: ${username || '—'} (${role.replace('ROLE_', '').replace(/_/g, ' ')})`;
            document.getElementById('user-role-badge').textContent = role.replace('ROLE_', '').replace(/_/g, ' ');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = '../dockdashthankyou.html';
        }

        // ── Tab Switcher ──
        function switchTab(panelId, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(panelId).classList.add('active');
            btn.classList.add('active');

            if (panelId === 'panel-view') {
                document.getElementById('logs-table-container').style.display = 'none';
            }
        }

        // Authorization headers helper
        function authHeaders(extra) {
            return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
        }

        function showResponse(boxId, content, isError) {
            const box = document.getElementById(boxId);
            box.className = 'response-box show ' + (isError ? 'error' : 'success');
            box.innerHTML = content;
        }

        // Error Handler
        async function handleApiError(res, boxId) {
            if (res.status === 401) {
                alert('Session expired or unauthorized. Redirecting to login...');
                logout();
                return true;
            }
            if (res.status === 403) {
                showResponse(boxId, '<strong>Access Denied!</strong> Your current role doesn\'t have permission to perform this operation.', true);
                return true;
            }
            return false;
        }

        // Format Date
        function formatDateTime(dtStr) {
            if (!dtStr) return '—';
            return dtStr.replace('T', ' ').substring(0, 19);
        }

        // ── FETCH LOGS FOR APPOINTMENT ──
        async function fetchLogs() {
            const appId = document.getElementById('query-app-id').value.trim();
            const loader = document.getElementById('table-loader');
            const container = document.getElementById('logs-table-container');
            const resBox = document.getElementById('res-view');

            if (!appId) {
                showResponse('res-view', '⚠️ Please enter an Appointment ID.', true);
                container.style.display = 'none';
                return;
            }

            loader.style.display = 'block';
            container.style.display = 'none';
            container.innerHTML = '';
            resBox.className = 'response-box'; // hide

            try {
                const res = await fetch(`${API}/activities/appointment/${appId}`, {
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-view')) {
                    loader.style.display = 'none';
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', 'Failed to retrieve logs: ' + (data.message || res.statusText), true);
                    loader.style.display = 'none';
                    return;
                }

                const logs = await res.json();
                loader.style.display = 'none';

                if (logs.length === 0) {
                    showResponse('res-view', 'No activity logs recorded for this appointment yet.', false);
                    return;
                }

                let html = `<table>
                    <thead>
                        <tr>
                            <th>Log ID</th>
                            <th>Performed By</th>
                            <th>Activity Type</th>
                            <th>Timestamp</th>
                            <th>Notes</th>
                            <th>Approval Status</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody>`;

                logs.forEach(log => {
                    const approvedClass = log.approved ? 'badge-approved' : 'badge-pending';
                    
                    // Approve requires role DOCK_MANAGER or LOGISTICS_COORDINATOR
                    let actionHtml = '—';
                    if (!log.approved) {
                        const disabledAttr = (role === 'ROLE_DOCK_MANAGER' || role === 'ROLE_LOGISTICS_COORDINATOR') ? '' : 'disabled style="opacity:0.5; cursor:not-allowed;" title="Requires Dock Manager or Logistics Coordinator"';
                        actionHtml = `<button class="action-btn action-approve" ${disabledAttr} onclick="approveLog(${log.id})">Approve</button>`;
                    }

                    if (actionHtml === '—') actionHtml = '';
                    actionHtml += `<button class="action-btn action-edit" onclick="alert('Edit functionality not yet implemented')">EDIT</button>
                                   <button class="action-btn action-delete" onclick="deleteLog(${log.id})">Delete</button>`;

                    html += `
                        <tr>
                            <td><strong>${log.id}</strong></td>
                            <td>${escapeHtml(log.performedBy.username)} (${escapeHtml(log.performedBy.role)})</td>
                            <td><span style="font-weight:600; color:#ffd700;">${log.activityType}</span></td>
                            <td>${formatDateTime(log.timestamp)}</td>
                            <td style="max-width: 250px; overflow-wrap: break-word;">${escapeHtml(log.notes || '—')}</td>
                            <td><span class="badge ${approvedClass}">${log.approved ? 'APPROVED' : 'PENDING'}</span></td>
                            <td>${actionHtml}</td>
                        </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
                container.style.display = 'block';

            } catch (e) {
                loader.style.display = 'none';
                showResponse('res-view', 'Cannot connect to server. Ensure backend is running.', true);
            }
        }

        // ── APPROVE ACTIVITY LOG ──
        async function approveLog(logId) {
            const resBox = document.getElementById('res-view');
            resBox.className = 'response-box'; // hide

            try {
                const res = await fetch(`${API}/activities/${logId}/approve`, {
                    method: 'PUT',
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-view')) {
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', 'Failed to approve log: ' + (data.message || res.statusText), true);
                    return;
                }

                showResponse('res-view', `✅ Activity Log <strong>#${logId}</strong> successfully approved.`, false);
                
                // Refresh list
                fetchLogs();

            } catch (e) {
                showResponse('res-view', 'Connection error to backend server.', true);
            }
        }

        // ── DELETE ACTIVITY LOG ──
        async function deleteLog(logId) {
            if (!confirm('Are you sure you want to delete Activity Log ID ' + logId + '?')) return;
            const resBox = document.getElementById('res-view');
            resBox.className = 'response-box'; // hide

            try {
                const res = await fetch(`${API}/activities/${logId}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (await handleApiError(res, 'res-view')) {
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-view', 'Failed to delete log: ' + (data.message || res.statusText), true);
                    return;
                }

                showResponse('res-view', `✅ Activity Log <strong>#${logId}</strong> deleted successfully.`, false);
                fetchLogs();

            } catch (e) {
                showResponse('res-view', 'Connection error to backend server.', true);
            }
        }

        // ── LOG NEW ACTIVITY ──
        async function logActivity() {
            const appointmentId = document.getElementById('log-app-id').value.trim();
            const activityType = document.getElementById('log-type').value;
            const notes = document.getElementById('log-notes').value.trim();

            if (!appointmentId) {
                showResponse('res-log', '⚠️ Please specify a valid Appointment ID.', true);
                return;
            }

            const btn = document.getElementById('btn-log-submit');
            btn.disabled = true;

            try {
                const res = await fetch(API + '/activities', {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({
                        appointmentId: parseInt(appointmentId),
                        activityType,
                        notes
                    })
                });

                if (await handleApiError(res, 'res-log')) {
                    btn.disabled = false;
                    return;
                }

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showResponse('res-log', 'Error logging activity: ' + (data.message || res.statusText), true);
                } else {
                    const data = await res.json();
                    showResponse('res-log', `✅ Activity logged successfully! ID: <strong>${data.id}</strong>. Status: <span class="badge badge-pending">PENDING APPROVAL</span>.`, false);
                    document.getElementById('log-app-id').value = '';
                    document.getElementById('log-notes').value = '';
                }
            } catch (e) {
                showResponse('res-log', 'Connection error to backend server.', true);
            } finally {
                btn.disabled = false;
            }
        }

        // Helper to escape HTML tags
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
